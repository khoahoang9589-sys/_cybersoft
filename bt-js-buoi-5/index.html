<!doctype html>
<html lang="en" data-bs-theme="light">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Bootstrap CSS v5.3.8 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.min.css"
        integrity="sha512-2bBQCjcnw658Lho4nlXJcc6WkV/UxpE/sAokbXPxQNGqmNdQrWqtw26Ns9kFF/yG792pKR1Sx8/Y1Lf1XN4GKA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Bài Tập JS - Buổi 5 - Hoàng Anh Khoa</title>
</head>

<body>
    <div class="container w-75 mt-5 p-2 shadow rounded bg-body-tertiary border-1 border">
        <!-- Nav tabs -->
        <ul class="nav nav-tabsfs-5" id="myTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="bt1-tab" data-bs-toggle="tab" data-bs-target="#bt1" type="button"
                    role="tab" aria-controls="bt1" aria-selected="true">
                    Bài tập 1
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="bt2-tab" data-bs-toggle="tab" data-bs-target="#bt2" type="button"
                    role="tab" aria-controls="bt2" aria-selected="false">
                    Bài tập 2
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="bt3-tab" data-bs-toggle="tab" data-bs-target="#bt3" type="button"
                    role="tab" aria-controls="bt3" aria-selected="false">
                    Bài tập 3
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="bt4-tab" data-bs-toggle="tab" data-bs-target="#bt4" type="button"
                    role="tab" aria-controls="bt4" aria-selected="false">
                    Bài tập 4
                </button>
            </li>
        </ul>
        <!-- End Nav tabs -->

        <div class="tab-content px-2 pt-2">
            <!-- start bt1-->
            <div class="tab-pane active" id="bt1" role="tabpanel" aria-labelledby="bt1-tab">
                <div class="container">
                    <h3 class="text-success">Quản lý tuyển sinh</h3>
                    <form class="row gy-3 align-items-center px-2">
                        <div class="col-12 col-lg-4">
                            <input type="number" class="form-control" id="inputScore1" placeholder="Điểm chuẩn">
                        </div>
                        <div class="col-12 col-lg-4">
                            <select class="form-control" name="" id="selLocation">
                                <option value="0">Chọn khu vực</option>
                                <option value="2">A</option>
                                <option value="1">B</option>
                                <option value="0.5">C</option>
                            </select>
                        </div>
                        <div class="col-12 col-lg-4">
                            <select class="form-control" name="" id="selUser">
                                <option value="0">Chọn đối tượng</option>
                                <option value="2.5">1</option>
                                <option value="1.5">2</option>
                                <option value="1">3</option>
                            </select>
                        </div>
                        <div class="col-12 col-lg-4">
                            <input type="number" class="form-control" id="inputScore2" placeholder="Điểm môn thứ 1">
                        </div>
                        <div class="col-12 col-lg-4">
                            <input type="number" class="form-control" id="inputScore3" placeholder="Điểm môn thứ 2">
                        </div>
                        <div class="col-12 col-lg-4">
                            <input type="number" class="form-control" id="inputScore4" placeholder="Điểm môn thứ 3">
                        </div>

                        <div class="col-12">
                            <button class="btn btn-primary me-1 mb-1" type="button" id="btnResult">Kết Quả</button>
                        </div>
                        <div class="alert alert-success" role="alert">
                            👉<span id="txtResult"></span>
                        </div>
                    </form>
                </div>
            </div>
            <!-- end bt1-->

            <!-- start bt2-->
            <div class="tab-pane" id="bt2" role="tabpanel" aria-labelledby="bt2-tab">
                <div class="container">
                    <h3 class="text-success">Tính tiền điện</h3>
                    <form class="row gy-3 align-items-center px-2">
                        <div class="col-12 col-lg-4">
                            <input type="text" class="form-control" id="inputName" placeholder="Nhập họ tên">
                        </div>

                        <div class="col-12 col-lg-4">
                            <input type="number" class="form-control" id="inputKW" placeholder="Nhập số kw">
                        </div>


                        <div class="col-12">
                            <button class="btn btn-primary me-1 mb-1" type="button" id="btnElecBill">Tính tiền
                                điện</button>
                        </div>
                        <div class="alert alert-success" role="alert">
                            👉<span id="txtElecBill"></span>
                        </div>
                    </form>
                </div>
            </div>
            <!-- end bt2-->

            <!-- start bt3-->
            <div class="tab-pane" id="bt3" role="tabpanel" aria-labelledby="bt3-tab">
                <div class="container">
                    <h3 class="text-success">Tính thuế thu nhập cá nhân</h3>
                    <form class="row gy-3 align-items-center px-2">
                        <div class="col-12 col-lg-4">
                            <input type="text" class="form-control" id="inputName2" placeholder="Nhập họ tên">
                        </div>
                        <div class="col-12 col-lg-4">
                            <input type="number" class="form-control" id="inputSalary" placeholder="Tổng thu nhập năm">
                        </div>
                        <div class="col-12 col-lg-4">
                            <input type="number" class="form-control" id="inputUser" placeholder="Số người phụ thuộc">
                        </div>


                        <div class="col-12">
                            <button class="btn btn-primary me-1 mb-1" type="button" id="btnTax">Tính tiền
                                thuế</button>
                        </div>
                        <div class="alert alert-success" role="alert">
                            👉<span id="txtTax"></span>
                        </div>
                    </form>
                </div>
            </div>
            <!-- end bt3-->

            <!-- start bt4-->
            <div class="tab-pane" id="bt4" role="tabpanel" aria-labelledby="bt4-tab">
                <div class="container">
                    <h3 class="text-success">Tính tiền cáp</h3>
                    <form class="row gy-3 align-items-center px-2">
                        <div class="col-12col-lg-4">
                            <select class="form-control" name="" id="selCustomer" onchange="disableInput()">
                                <option value="">Chọn loại khách hàng</option>
                                <option value="user">Nhà Dân</option>
                                <option value="company">Doanh Nghiệp</option>
                            </select>
                        </div>
                        <div class="col-12 col-lg-4">
                            <input type="text" class="form-control" id="inputID" placeholder="Nhập mã khách hàng">
                        </div>
                        <div class="col-12 col-lg-4">
                            <input type="number" class="form-control" id="inputChanel" placeholder="Số kênh cao cấp">
                        </div>
                        <div class="col-12 col-lg-4">
                            <input type="number" style="display: none;" class="form-control" id="inputConnect"
                                placeholder="Số kết nối">
                        </div>



                        <div class="col-12">
                            <button class="btn btn-primary me-1 mb-1" type="button" id="btnNet">Tính tiền
                                cáp</button>
                        </div>
                        <div class="alert alert-success" role="alert">
                            👉<span id="txtNet"></span>
                        </div>
                    </form>
                </div>
            </div>
            <!-- end bt4-->
        </div>

    </div>
    <script src="script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.min.js"
        integrity="sha512-nKXmKvJyiGQy343jatQlzDprflyB5c+tKCzGP3Uq67v+lmzfnZUi/ZT+fc6ITZfSC5HhaBKUIvr/nTLCV+7F+Q=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</body>

</html>
